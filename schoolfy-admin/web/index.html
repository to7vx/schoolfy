<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Schoolfy Admin Dashboard - Manage school pickup system">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Schoolfy Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Schoolfy Admin Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&family=Noto+Color+Emoji&family=Noto+Sans+Symbols&family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Roboto', 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #080B14;
      overflow: hidden;
    }

    /* ── Loading screen ── */
    .loading-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #080B14;
      color: white;
      z-index: 9999;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1D4ED8, #3B82F6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      animation: pulse-logo 2.5s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
    }

    .logo svg { width: 40px; height: 40px; fill: white; }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      color: #fff;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
      text-align: center;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(59,130,246,0.2);
      border-radius: 50%;
      border-top-color: #3B82F6;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes pulse-logo {
      0%, 100% { box-shadow: 0 0 30px rgba(59,130,246,0.35); transform: scale(1); }
      50%       { box-shadow: 0 0 55px rgba(59,130,246,0.55); transform: scale(1.04); }
    }

    .fade-out { opacity: 0; transition: opacity 0.5s ease-out; }

    /* ── Demo hint ── */
    #demo-hint {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 99999;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    #demo-card {
      background: rgba(10, 18, 40, 0.92);
      border: 1px solid rgba(59,130,246,0.35);
      border-radius: 16px;
      padding: 20px 20px 16px;
      color: #fff;
      backdrop-filter: blur(16px);
      width: 230px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.1);
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      transition:
        max-height 0.35s cubic-bezier(0.4,0,0.2,1),
        opacity 0.25s ease,
        transform 0.3s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }

    #demo-card.open {
      max-height: 200px;
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .demo-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 14px;
    }

    .demo-row { margin-bottom: 12px; }
    .demo-row:last-of-type { margin-bottom: 0; }

    .demo-label {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }

    .demo-value {
      font-size: 13.5px;
      font-weight: 600;
      color: #fff;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .demo-value:hover {
      background: rgba(59,130,246,0.18);
      border-color: rgba(59,130,246,0.45);
    }

    .demo-value .copy-icon {
      opacity: 0.4;
      font-size: 14px;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .demo-value:hover .copy-icon { opacity: 0.8; }

    .demo-value.copied {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.35);
      color: #4ade80;
    }

    .demo-divider {
      height: 1px;
      background: rgba(59,130,246,0.12);
      margin: 12px 0;
    }

    .demo-footer {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      margin-top: 12px;
    }

    #demo-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, #1D4ED8, #3B82F6);
      border: none;
      border-radius: 50px;
      padding: 10px 18px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(59,130,246,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.02em;
    }

    #demo-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(59,130,246,0.6);
    }

    #demo-toggle:active { transform: translateY(0); }

    #demo-toggle .toggle-icon {
      font-size: 15px;
      transition: transform 0.3s ease;
    }

    #demo-toggle.active .toggle-icon { transform: rotate(45deg); }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
      </svg>
    </div>
    <div class="title">Schoolfy Admin</div>
    <div class="subtitle">Loading dashboard...</div>
    <div class="spinner"></div>
  </div>

  <div id="demo-hint">
    <div id="demo-card">
      <div class="demo-header">Demo Credentials</div>

      <div class="demo-row">
        <div class="demo-label">Email</div>
        <div class="demo-value" onclick="copyVal(this, 'admin@schoolfy.com')">
          <span>admin@schoolfy.com</span>
          <span class="copy-icon">⧉</span>
        </div>
      </div>

      <div class="demo-divider"></div>

      <div class="demo-row">
        <div class="demo-label">Password</div>
        <div class="demo-value" onclick="copyVal(this, 'Admin123')">
          <span>Admin123</span>
          <span class="copy-icon">⧉</span>
        </div>
      </div>

      <div class="demo-footer">click a field to copy</div>
    </div>

    <button id="demo-toggle" onclick="toggleDemo()">
      <span class="toggle-icon">✦</span>
      <span>Demo</span>
    </button>
  </div>

  <script>
    function toggleDemo() {
      const card = document.getElementById('demo-card');
      const btn  = document.getElementById('demo-toggle');
      card.classList.toggle('open');
      btn.classList.toggle('active');
    }

    function copyVal(el, text) {
      navigator.clipboard.writeText(text).then(() => {
        el.classList.add('copied');
        const span = el.querySelector('span:first-child');
        const orig = span.textContent;
        span.textContent = '✓ Copied!';
        setTimeout(() => {
          span.textContent = orig;
          el.classList.remove('copied');
        }, 1600);
      });
    }

    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      loading.classList.add('fade-out');
      setTimeout(() => { loading.style.display = 'none'; }, 500);
    });

    setTimeout(() => {
      const loading = document.getElementById('loading');
      if (loading && loading.style.display !== 'none') {
        loading.classList.add('fade-out');
        setTimeout(() => { loading.style.display = 'none'; }, 500);
      }
    }, 10000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
