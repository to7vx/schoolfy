name: admin_dashboard
description: Schoolfy Admin Dashboard - Web-based management interface for school staff

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_database: ^11.3.9
  
  # UI Components
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # Data handling
  csv: ^6.0.0
  file_picker: ^10.2.0
  
  # State management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.3
  
  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/
